name: marketplace_customer
description: كيف نخدمك - تطبيق المستخدم
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # HTTP & API
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Firebase
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  firebase_analytics: ^10.8.9

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Media
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # Barcode Scanner
  mobile_scanner: ^3.5.6

  # Real-time Messaging
  socket_io_client: ^2.0.3+1

  # UI Components
  shimmer: ^3.0.0
  lottie: ^2.7.0
  flutter_svg: ^2.0.9
  fluttertoast: ^8.2.4
  badges: ^3.1.2
  smooth_page_indicator: ^1.1.0
  expandable: ^5.0.1

  # Payments
  flutter_stripe: ^9.4.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  permission_handler: ^11.2.0
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  uuid: ^4.2.2
  flutter_dotenv: ^5.1.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  flutter_jailbreak_detection: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env

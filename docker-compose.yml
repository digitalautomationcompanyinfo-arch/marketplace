version: '3.9'

# ============================================
# كيف نخدمك - Docker Compose
# تشغيل كل الخدمات دفعة واحدة
# ============================================

services:

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3   # PostgreSQL + PostGIS للبحث الجغرافي
    container_name: marketplace_db
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME:-marketplace_db}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    # FIX C5: No public port exposure — accessible only within docker network
    expose:
      - "5432"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketplace_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: marketplace_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # FIX C5: No public port exposure — accessible only within docker network
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      # FIX L2: Healthcheck must authenticate with Redis password
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketplace_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketplace_api
    restart: always
    env_file: ./backend/.env
    environment:
      NODE_ENV:   production
      PORT:       5000
      DB_HOST:    postgres
      DB_PORT:    5432
      DB_NAME:    ${DB_NAME:-marketplace_db}
      DB_USER:    ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    # ports:
    #   - "5000:5000"  # Removed public exposure (use Nginx)
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/backups:/app/backups
      - backend_logs:/app/logs
    networks:
      - marketplace_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Admin Dashboard ──────────────────────────────────────
  admin:
    build:
      context: ./admin_dashboard
      dockerfile: Dockerfile
    container_name: marketplace_admin
    restart: always
    environment:
      REACT_APP_API_URL: https://api.marketplace.com/api/v1
    # ports:
    #   - "3000:80"   # Removed public exposure (use Nginx)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    depends_on:
      - backend
    networks:
      - marketplace_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: marketplace_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - admin
    networks:
      - marketplace_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  nginx_ssl:
  nginx_logs:

networks:
  marketplace_net:
    driver: bridge

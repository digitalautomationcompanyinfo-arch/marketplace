name: marketplace_provider
description: كيف نخدمك - تطبيق مزود الخدمة
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  firebase_core: ^4.5.0
  flutter_local_notifications: ^16.3.0
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  cached_network_image: ^3.3.1
  mobile_scanner: ^3.5.6          # مسح الباركود
  socket_io_client: ^2.0.3+1
  shimmer: ^3.0.0
  lottie: ^2.7.0
  flutter_stripe: ^9.4.0
  fl_chart: ^0.65.0               # رسوم بيانية الإحصاءات
  intl: ^0.20.2
  google_fonts: ^6.1.0
  url_launcher: any
  permission_handler: ^11.2.0
  share_plus: ^7.2.1
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^10.0.0
  flutter_jailbreak_detection: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env

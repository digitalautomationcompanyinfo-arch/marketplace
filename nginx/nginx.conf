events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:5000;
    }

    upstream admin {
        server admin:80;
    }

    # ─── Security Hardening (Advanced) ────────────────────
    server_tokens off;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    client_max_body_size 1M; # Match backend limit (Hardened)
    large_client_header_buffers 4 4k;

    # ─── Rate & Connection Limiting ───────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn addr 100; # Max 100 connections per IP

    # ─── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css;

    # ─── HTTP to HTTPS Redirect ───────────────────────────
    server {
        listen 80;
        server_name localhost api.marketplace.com admin.marketplace.com;
        return 301 https://$host$request_uri;
    }

    # ─── Combined Marketplace Server (API & Admin) ────────
    server {
        listen 443 ssl default_server;
        server_name localhost api.marketplace.com admin.marketplace.com;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # ─── SSL Hardening ─────────────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_dhparam /etc/nginx/ssl/dhparam.pem;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ─── Security Headers ──────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.google.com; connect-src 'self' https://*.stripe.com; frame-src 'self' https://js.stripe.com;" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        
        # Performance & Safety
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Dashboard (React App)
        location / {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.io
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health Check — FIX LOW-NEW-1: restricted to internal access only
        location /health {
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker internal network
            deny all;
            proxy_pass http://backend/health;
        }
    }
}
